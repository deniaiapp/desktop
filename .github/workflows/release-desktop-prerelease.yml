name: release-desktop-prerelease

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main

concurrency:
  group: release-desktop-prerelease-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare-release:
    name: Prepare pre-release
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag_name: ${{ steps.meta.outputs.tag_name }}
      release_name: ${{ steps.meta.outputs.release_name }}
      release_id: ${{ steps.create_release.outputs.release_id }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Compute release metadata
        id: meta
        shell: bash
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          UTC_STAMP="$(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          TAG_STAMP="$(date -u +'%Y%m%d-%H%M%S')"
          TAG_NAME="v${VERSION}-${TAG_STAMP}"
          RELEASE_NAME="${VERSION}-${UTC_STAMP} (Pre-release)"

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag_name=${TAG_NAME}" >> "$GITHUB_OUTPUT"
          echo "release_name=${RELEASE_NAME}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub pre-release
        id: create_release
        uses: actions/github-script@v7
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          TAG_NAME: ${{ steps.meta.outputs.tag_name }}
          RELEASE_NAME: ${{ steps.meta.outputs.release_name }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const release = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: process.env.TAG_NAME,
              name: process.env.RELEASE_NAME,
              prerelease: true,
              draft: false,
              target_commitish: context.sha,
              body: `Automated desktop pre-release for ${process.env.VERSION}.`,
            });

            core.setOutput("release_id", String(release.data.id));

  build-and-upload:
    name: Build ${{ matrix.name }}
    needs: prepare-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            runner: windows-2022
            target: x86_64-pc-windows-msvc
          - name: Windows arm64
            runner: windows-11-arm
            target: aarch64-pc-windows-msvc
          - name: macOS x64
            runner: macos-26-large
            target: x86_64-apple-darwin
          - name: macOS arm64
            runner: macos-26-xlarge
            target: aarch64-apple-darwin
          - name: Linux x64
            runner: ubuntu-latest-16core
            target: x86_64-unknown-linux-gnu
          - name: Linux arm64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
    runs-on:
      labels: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: startsWith(matrix.runner, 'ubuntu-')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xdg-utils

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install JavaScript dependencies
        run: bun install --frozen-lockfile

      - name: Build and upload Tauri bundle
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.prepare-release.outputs.release_id }}
          tagName: ${{ needs.prepare-release.outputs.tag_name }}
          releaseDraft: false
          prerelease: true
          tauriScript: bunx tauri
          args: --target ${{ matrix.target }}
          releaseAssetNamePattern: "[name]_[version]_[platform]_[arch][setup][ext]"
          retryAttempts: 2
